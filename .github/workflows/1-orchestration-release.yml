name: 1 - Orchestration Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-artifacts:
    name: 1 - Build Release Artifacts
    runs-on: ubuntu-latest

    outputs:
      version_name: ${{ steps.release_version.outputs.version_name }}
      tag_name: ${{ steps.release_version.outputs.tag_name }}
      commit_sha: ${{ steps.release_commit.outputs.commit_sha }}
      github_apk_artifact_name: ${{ steps.artifact_names.outputs.github_apk_artifact_name }}
      play_aab_artifact_name: ${{ steps.artifact_names.outputs.play_aab_artifact_name }}

    env:
      ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/signing/upload-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate release secrets
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }
          test -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" || { echo "Missing GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64"; exit 1; }

      - name: Decode release keystore
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/signing"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_FILE"
          test -f "$ANDROID_KEYSTORE_FILE" || { echo "Keystore file was not created"; exit 1; }
          echo "Keystore file size: $(wc -c < "$ANDROID_KEYSTORE_FILE") bytes"

      - name: Auto-bump app version for manual releases
        id: auto_bump
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x ./gradlew
          latest_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')"
          next_version="$(python3 tools/bump_gradle_version.py --gradle-file app/build.gradle.kts --readme-file README.md --latest-tag "$latest_tag")"
          test -n "$next_version" || { echo "Failed to compute next app version"; exit 1; }
          echo "version_name=$next_version" >> "$GITHUB_OUTPUT"
          echo "Manual release auto-bumped appVersionName to $next_version (latest published tag: ${latest_tag:-none})"

      - name: Commit auto-bumped app version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if git diff --quiet -- app/build.gradle.kts README.md; then
            echo "No version metadata changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts README.md
          git commit -m "release: bump Android version to ${{ steps.auto_bump.outputs.version_name }}"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Read Android release version
        id: release_version
        shell: bash
        run: |
          chmod +x ./gradlew
          version_name="$(./gradlew -q :app:printReleaseVersionName)"
          test -n "$version_name" || { echo "Gradle returned an empty versionName"; exit 1; }
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version_name" >> "$GITHUB_OUTPUT"
          echo "Android versionName: $version_name"

      - name: Validate release tag matches app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          expected_tag="${{ steps.release_version.outputs.tag_name }}"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match Android versionName ${{ steps.release_version.outputs.version_name }}."
            echo "Update app/build.gradle.kts or push tag $expected_tag."
            exit 1
          fi

      - name: Read release commit
        id: release_commit
        shell: bash
        run: |
          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "Release commit: $commit_sha"

      - name: Build signed release artifacts
        shell: bash
        run: |
          ./gradlew test :app:stageGithubReleaseApk :app:bundleRelease --no-daemon

          src_aab="$(find app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' | head -n 1)"
          test -n "$src_aab" || { echo "No release AAB found"; exit 1; }
          cp "$src_aab" "build/release/hermes-webui-v${{ steps.release_version.outputs.version_name }}.aab"

          find build/release -maxdepth 1 -type f -name '*.apk' -print
          find build/release -maxdepth 1 -type f -name '*.aab' -print

      - name: Validate staged release artifacts
        shell: bash
        run: |
          apk_count="$(find build/release -maxdepth 1 -type f -name 'hermes-webui-v*-github.apk' | wc -l | tr -d ' ')"
          aab_count="$(find build/release -maxdepth 1 -type f -name 'hermes-webui-v*.aab' | wc -l | tr -d ' ')"

          if [ "$apk_count" != "1" ]; then
            echo "Expected exactly one GitHub APK artifact, found $apk_count."
            find build/release -maxdepth 1 -type f -name '*.apk' -print
            exit 1
          fi

          if [ "$aab_count" != "1" ]; then
            echo "Expected exactly one Play AAB artifact, found $aab_count."
            find build/release -maxdepth 1 -type f -name '*.aab' -print
            exit 1
          fi

      - name: Set artifact names
        id: artifact_names
        shell: bash
        run: |
          echo "github_apk_artifact_name=hermes-webui-v${{ steps.release_version.outputs.version_name }}-github-apk" >> "$GITHUB_OUTPUT"
          echo "play_aab_artifact_name=hermes-webui-v${{ steps.release_version.outputs.version_name }}-play-aab" >> "$GITHUB_OUTPUT"

      - name: Write manual publish retry details
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Manual Publish Retry Details

          Use these values if one publish target fails after artifact upload:

          - Build run ID: \`${{ github.run_id }}\`
          - Commit SHA: \`${{ steps.release_commit.outputs.commit_sha }}\`
          - Version name: \`${{ steps.release_version.outputs.version_name }}\`
          - Tag name: \`${{ steps.release_version.outputs.tag_name }}\`
          - GitHub APK artifact: \`${{ steps.artifact_names.outputs.github_apk_artifact_name }}\`
          - Play AAB artifact: \`${{ steps.artifact_names.outputs.play_aab_artifact_name }}\`
          EOF

      - name: Upload signed GitHub APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_names.outputs.github_apk_artifact_name }}
          path: build/release/*-github.apk
          if-no-files-found: error

      - name: Upload Play AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_names.outputs.play_aab_artifact_name }}
          path: build/release/*.aab
          if-no-files-found: error

  publish-github-release:
    name: 2 - Publish GitHub APK
    needs: build-release-artifacts
    uses: ./.github/workflows/2-publish-github-apk.yml
    permissions:
      contents: write
      actions: read
    with:
      artifact_name: ${{ needs.build-release-artifacts.outputs.github_apk_artifact_name }}
      build_run_id: ${{ github.run_id }}
      commit_sha: ${{ needs.build-release-artifacts.outputs.commit_sha }}
      tag_name: ${{ needs.build-release-artifacts.outputs.tag_name }}
      version_name: ${{ needs.build-release-artifacts.outputs.version_name }}

  publish-play-production:
    name: 3 - Publish Play Store Production
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Validate Play service account secret
        shell: bash
        run: |
          test -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" || { echo "Missing GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64"; exit 1; }

      - name: Download Play AAB artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build-release-artifacts.outputs.play_aab_artifact_name }}
          path: build/release
          run-id: ${{ github.run_id }}
          github-token: ${{ github.token }}

      - name: Validate Play AAB artifact
        shell: bash
        run: |
          aab_count="$(find build/release -maxdepth 1 -type f -name 'hermes-webui-v*.aab' | wc -l | tr -d ' ')"
          if [ "$aab_count" != "1" ]; then
            echo "Expected exactly one Play AAB artifact, found $aab_count."
            find build/release -maxdepth 1 -type f -print
            exit 1
          fi

      - name: Decode Google Play service account
        shell: bash
        run: |
          mkdir -p signing
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > signing/google-play-service-account.json
          test -f signing/google-play-service-account.json || { echo "Google Play service account file was not created"; exit 1; }

      - name: Build Play Store changelog
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-release-artifacts.outputs.tag_name }}
          RELEASE_COMMIT: ${{ needs.build-release-artifacts.outputs.commit_sha }}
        run: |
          mkdir -p build/play-whatsnew

          generated_notes="$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$RELEASE_COMMIT" \
            --jq '.body')"

          export GENERATED_NOTES="$generated_notes"
          python3 <<'PY' > build/play-whatsnew/whatsnew-en-US
          import os
          import re

          max_chars = 480
          report_line = "Report issues through the in-app bug report tool."
          notes = os.environ.get("GENERATED_NOTES", "")
          bullets = []

          for raw_line in notes.splitlines():
              line = raw_line.strip()
              if not line:
                  continue
              if line.startswith("#"):
                  continue
              if "Full Changelog" in line or "compare/" in line:
                  continue
              if line.lower().startswith("new contributors"):
                  continue
              if line.startswith(("* ", "- ")):
                  line = "- " + line[2:].strip()
              else:
                  continue
              line = re.sub(r"\[([^\]]+)\]\([^)]+\)", r"\1", line)
              line = re.sub(r"\s+by\s+@[A-Za-z0-9-]+(?:\s+in\s+#\d+)?$", "", line)
              line = re.sub(r"\s+in\s+#\d+$", "", line)
              line = re.sub(r"@[A-Za-z0-9-]+", "", line)
              line = re.sub(r"#(\d+)", r"issue \1", line)
              line = line.replace("`", "")
              line = re.sub(r"\s+", " ", line).strip()
              if line and line not in bullets:
                  bullets.append(line)

          if not bullets:
              bullets = ["- Bug fixes and Android wrapper improvements."]

          output_lines = []
          for bullet in bullets:
              candidate_lines = output_lines + [bullet, "", report_line]
              candidate = "\n".join(candidate_lines)
              if len(candidate) <= max_chars:
                  output_lines.append(bullet)
              if len(output_lines) >= 4:
                  break

          if not output_lines:
              output_lines = [bullets[0][: max_chars - len(report_line) - 3].rstrip()]

          text = "\n".join(output_lines + ["", report_line])
          if len(text) > max_chars:
              available = max_chars - len(report_line) - 2
              trimmed = "\n".join(output_lines)
              text = trimmed[:available].rstrip() + "\n\n" + report_line

          print(text)
          PY
          cat build/play-whatsnew/whatsnew-en-US

      - name: Upload AAB to Google Play production
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: signing/google-play-service-account.json
          packageName: com.hermeswebui.android
          releaseFiles: build/release/*.aab
          tracks: production
          status: completed
          releaseName: Hermes WebUI Android v${{ needs.build-release-artifacts.outputs.version_name }}
          whatsNewDirectory: build/play-whatsnew
